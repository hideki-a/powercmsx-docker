; PowerCMS X PHP-FPM pool configuration
[www]
; Listen on all interfaces so Apache container can reach via TCP
listen = 0.0.0.0:9000

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500

; Logging to stdout/stderr for CloudWatch
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Pass environment variables through to PHP
; Secrets injected by ECS task definition (valueFrom Secrets Manager)
clear_env = no

; Set the session save path from env if provided
; php_value[session.save_path] = tcp://${REDIS_HOST}:6379
