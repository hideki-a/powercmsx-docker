[PHP]
; Error handling
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
error_log = /proc/1/fd/2
expose_php = Off
short_open_tag = Off

; Limits
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
output_buffering = Off
implicit_flush = On
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20
max_input_vars = 2000

; Timezone (override via environment if needed)
date.timezone = Asia/Tokyo

; Session
session.save_handler = redis
; session.save_path is set via environment variable SESSION_SAVE_PATH
; e.g. "tcp://your-elasticache-endpoint:6379"
session.cookie_httponly = On
session.cookie_samesite = Lax

; OPcache
[opcache]
opcache.enable = 0
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.save_comments = 1

; MeCab
[mecab]
mecab.default_rcfile = /usr/local/etc/mecabrc
