# ----------------------------------------------------------------
# PowerCMS X Virtual Host
#
# Directory layout:
#   /var/www/html        – Apache DocumentRoot, static HTML output
#   /var/www/powercmsx   – PowerCMS X app
#
# PHP_FPM_HOST injected at runtime via environment variable
# ----------------------------------------------------------------

Define PHP_FPM_HOST "${PHP_FPM_HOST}"

<VirtualHost *:80>
    ServerName localhost

    # ----------------------------------------------------------------
    # Document root – serves static HTML published by PowerCMS X
    # ----------------------------------------------------------------
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Cache-control for published static HTML
        # <IfModule mod_expires.c>
        #     ExpiresActive On
        #     ExpiresByType text/html              "access plus 1 hour"
        #     ExpiresByType text/css               "access plus 1 year"
        #     ExpiresByType application/javascript "access plus 1 year"
        #     ExpiresByType image/jpeg             "access plus 1 year"
        #     ExpiresByType image/png              "access plus 1 year"
        #     ExpiresByType image/svg+xml          "access plus 1 year"
        #     ExpiresByType image/webp             "access plus 1 year"
        #     ExpiresByType font/woff2             "access plus 1 year"
        # </IfModule>
    </Directory>

    # ----------------------------------------------------------------
    # PowerCMS X admin / application interface
    #
    # 静的ファイル（CSS/JS/画像）は Apache が /var/www/powercmsx を直接配信。
    # .php のみ php-fpm へ転送。
    # ----------------------------------------------------------------
    Alias /powercmsx /var/www/powercmsx

    <Directory /var/www/powercmsx>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # /powercmsx/foo/bar.php → php-fpm:/var/www/powercmsx/foo/bar.php
    # flushpackets=on: mod_proxy_fcgi のバッファリングを無効にして flush() を有効化
    ProxyPassMatch \
        "^/powercmsx(/.+\.php)(/.*)?$" \
        "fcgi://${PHP_FPM_HOST}:9000/var/www/powercmsx$1$2" \
        flushpackets=on

    # ----------------------------------------------------------------
    # PHP files in the document root (/var/www/html)
    # ----------------------------------------------------------------
    ProxyPassMatch \
        "^(/.+\.php)(/.*)?$" \
        "fcgi://${PHP_FPM_HOST}:9000/var/www/html$1$2" \
        flushpackets=on

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
        Header unset Server
        Header always unset X-Powered-By
    </IfModule>

    # ----------------------------------------------------------------
    # Health check endpoint (ALB / ECS health check)
    # ----------------------------------------------------------------
    <Location /healthz>
        SetHandler server-status
        Require local
        Require ip 10.0.0.0/8
    </Location>

    # ----------------------------------------------------------------
    # Deny access to sensitive files
    # ----------------------------------------------------------------
    <FilesMatch "(\.htaccess|\.htpasswd|\.env|composer\.(json|lock)|\.git|config\.json)">
        Require all denied
    </FilesMatch>

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
